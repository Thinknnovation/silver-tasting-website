<section
  class="contact"
  id="contact">

  <div class="container-custom">

    <div class="row align-items-center">

      <div class="col-lg-6">

        <h2 class="section-title">
          Reserva tu próxima experiencia
        </h2>

        <p class="section-subtitle">
          Vive una experiencia exclusiva
          alrededor del whiskey premium.
        </p>

      </div>

      <div class="col-lg-6">

        <form class="glass-card contact-form">

          <input
            type="text"
            placeholder="Nombre completo">

          <input
            type="email"
            placeholder="Correo electrónico">

          <input
            type="text"
            placeholder="Número de asistentes">

          <textarea
            rows="4"
            placeholder="Mensaje"></textarea>

          <button class="btn-gold w-100">
            Reservar vía WhatsApp
          </button>

        </form>

      </div>

    </div>

  </div>

</section>
